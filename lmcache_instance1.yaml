chunk_size: 6
local_cpu: True
max_local_cpu_size: 5.0
save_unfull_chunk: False
remote_url: "s3://lmcache-bucket.localhost:9000"
remote_serde: "naive"
blocking_timeout_secs: 10

enable_controller: True
lmcache_instance_id: "pesto"
controller_pull_url: "localhost:8300"
controller_reply_url: "localhost:8400"
lmcache_worker_ports: [8051]

extra_config:
  save_chunk_meta: False
  s3_num_io_threads: 64
  s3_prefer_http2: False
  s3_region: "us-east-1"
  s3_enable_s3express: False
  disable_tls: True
  aws_access_key_id: "minioadmin"
  aws_secret_access_key: "minioadmin"
